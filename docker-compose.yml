version: "3.8"
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports: ["9092:9092"]

  pg_loan_core:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PG_LOAN_USER:-loan}
      POSTGRES_PASSWORD: ${PG_LOAN_PASSWORD:-loanpass}
      POSTGRES_DB: ${PG_LOAN_DB:-loan_core}
    ports: ["5432:5432"]
    volumes:
      - pg_loan_core_data:/var/lib/postgresql/data

  pg_kyc:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PG_KYC_USER:-kyc}
      POSTGRES_PASSWORD: ${PG_KYC_PASSWORD:-kycpass}
      POSTGRES_DB: ${PG_KYC_DB:-kyc}
    ports: ["5433:5432"]
    volumes:
      - pg_kyc_data:/var/lib/postgresql/data

  # Application services
  loan-core:
    build: ./services/loan-core
    depends_on: [kafka, pg_loan_core]
    environment:
      - KAFKA_BROKER=kafka:9092
      - PG_LOAN_HOST=pg_loan_core
    ports:
      - "3001:3000"

  kyc:
    build: ./services/kyc
    depends_on: [kafka]
    environment:
      - KAFKA_BROKER=kafka:9092

  credit:
    build: ./services/credit
    depends_on: [kafka]
    environment:
      - KAFKA_BROKER=kafka:9092

  risk:
    build: ./services/risk
    depends_on: [kafka]
    environment:
      - KAFKA_BROKER=kafka:9092

  blacklist:
    build: ./services/blacklist
    depends_on: [kafka]
    environment:
      - KAFKA_BROKER=kafka:9092

  audit:
    build: 
      context: .
      dockerfile: ./services/audit/Dockerfile
    depends_on: [kafka]
    environment:
      - KAFKA_BROKER=kafka:9092
    volumes:
      - ./audit_logs:/app/audit_logs

  api-gateway:
    build: ./services/api-gateway
    depends_on: [loan-core, audit]
    environment:
      - LOAN_CORE_URL=http://loan-core:3000
      - AUDIT_URL=http://audit:3010
    ports:
      - "3000:3000"

volumes:
  pg_loan_core_data:
  pg_kyc_data:
